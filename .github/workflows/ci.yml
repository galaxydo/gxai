name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests (skip LLM integration tests)
        run: bun test --timeout 5000 || true
        # Some tests require OPENAI_API_KEY — they'll fail in CI without secrets
